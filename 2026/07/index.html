<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026년 7월 수업 캘린더 (스마트 버전)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; transition: background-color 0.3s; }
        .dark-mode-toggle { transition: all 0.3s ease; }
    </style>
</head>
<body id="body-bg" class="bg-slate-50 min-h-screen p-2 md:p-8 flex flex-col items-center justify-center text-slate-800">

    <div id="main-card" class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 transition-colors duration-300">
        
        <div class="bg-slate-950 p-5 md:p-6 text-white flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-center sm:text-left">
                <div class="flex items-center justify-center sm:justify-start gap-3">
                    <h1 class="text-2xl font-black tracking-wide">2026 JULY</h1>
                    <span id="today-badge" class="hidden bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full animate-pulse">TODAY</span>
                </div>
                <p class="text-slate-400 text-xs mt-1">영출어람 월수반 & 화목반 강의 일정</p>
            </div>
            
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <button onclick="toggleDarkMode()" id="dark-btn" class="p-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 dark-mode-toggle" title="화면 테마 변경">
                    <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                    </svg>
                    <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </button>
                <a href="https://omniscient-ship-112.notion.site/Month-A-37a0bc84f514808ab9fcf06d501c73e4" target="_blank" 
                   class="flex-1 sm:flex-none inline-flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold text-sm px-5 py-3 rounded-xl shadow-lg shadow-blue-900/20 transition-all transform hover:-translate-y-0.5">
                    <span>📁 7월 영출어람 자료</span>
                </a>
            </div>
        </div>

        <div class="p-3 md:p-6">
            <div class="grid grid-cols-5 gap-1 md:gap-2 text-center text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
            </div>

            <div id="calendar-days" class="grid grid-cols-5 gap-1 md:gap-2"></div>
        </div>

        <div id="footer-legend" class="bg-slate-50 px-6 py-3 border-t border-slate-100 flex justify-center gap-6 text-xs font-medium transition-colors duration-300">
            <div class="flex items-center gap-1.5">
                <span id="legend-blue" class="w-3 h-3 bg-blue-50 border border-blue-200 rounded"></span>
                <span class="text-slate-600" id="legend-text-1">월수반 수업</span>
            </div>
            <div class="flex items-center gap-1.5">
                <span id="legend-purple" class="w-3 h-3 bg-purple-50 border border-purple-200 rounded"></span>
                <span class="text-slate-600" id="legend-text-2">화목반 수업</span>
            </div>
        </div>
    </div>

    <script>
        const scheduleData = {
            '2026-07-01': { type: '월수', text: '영출어람 월수반 1강' },
            '2026-07-02': { type: '화목', text: '영출어람 화목반 1강' },
            '2026-07-03': { type: '공백', text: '' },
            '2026-07-06': { type: '월수', text: '영출어람 월수반 2강' },
            '2026-07-07': { type: '화목', text: '영출어람 화목반 2강' },
            '2026-07-08': { type: '월수', text: '영출어람 월수반 3강' },
            '2026-07-09': { type: '화목', text: '영출어람 화목반 3강' },
            '2026-07-10': { type: '공백', text: '' },
            '2026-07-13': { type: '월수', text: '영출어람 월수반 4강' },
            '2026-07-14': { type: '화목', text: '영출어람 화목반 4강' },
            '2026-07-15': { type: '월수', text: '영출어람 월수반 5강' },
            '2026-07-16': { type: '화목', text: '영출어람 화목반 5강' },
            '2026-07-17': { type: '공백', text: '' },
            '2026-07-20': { type: '월수', text: '영출어람 월수반 6강' },
            '2026-07-21': { type: '화목', text: '영출어람 화목반 6강' },
            '2026-07-22': { type: '월수', text: '영출어람 월수반 7강' },
            '2026-07-23': { type: '화목', text: '영출어람 화목반 7강' },
            '2026-07-24': { type: '공백', text: '' },
            '2026-07-27': { type: '월수', text: '영출어람 월수반 8강' },
            '2026-07-28': { type: '화목', text: '영출어람 화목반 8강' },
            '2026-07-29': { type: '공백', text: '' },
            '2026-07-30': { type: '공백', text: '' },
            '2026-07-31': { type: '공백', text: '' }
        };

        const calendarDaysContainer = document.getElementById('calendar-days');
        
        // 시스템 현재 날짜 구하기 (연, 월, 일 포맷팅)
        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonth = String(today.getMonth() + 1).padStart(2, '0');
        const currentDay = String(today.getDate()).padStart(2, '0');
        const todayStr = `${currentYear}-${currentMonth}-${currentDay}`;

        let isDarkMode = localStorage.getItem('calendarDarkMode') === 'true';

        function initCalendar() {
            calendarDaysContainer.innerHTML = '';

            // 헤더의 TODAY 배지 노출 제어 (현재가 2026년 7월인 경우에만 켬)
            if (currentYear === 2026 && currentMonth === '07') {
                document.getElementById('today-badge').classList.remove('hidden');
            }

            // 시작 빈칸 2개 생성
            for (let i = 0; i < 2; i++) {
                const blank = document.createElement('div');
                blank.className = `h-20 md:h-24 rounded-xl border transition-colors duration-300 ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-slate-50/50 border-slate-100/50'}`;
                calendarDaysContainer.appendChild(blank);
            }

            Object.keys(scheduleData).forEach((dateStr) => {
                const dayNum = parseInt(dateStr.split('-')[2]);
                const dayBox = document.createElement('div');
                const isToday = dateStr === todayStr; // 오늘 여부 검사

                let baseClass = "h-20 md:h-24 p-2 rounded-xl border text-left flex flex-col justify-between transition-all duration-300 relative ";
                
                // 테마별 기본 스타일 분기
                let bgClass = isDarkMode ? "bg-slate-900 border-slate-800 text-slate-100" : "bg-white border-slate-100 text-slate-800";
                let textClass = isDarkMode ? "text-slate-500" : "text-slate-400";
                let classContentHtml = '';

                const classInfo = scheduleData[dateStr];
                
                // 수업 종류별 컬러 설정 (라이트 모드 vs 다크 모드)
                if (classInfo.type === '월수') {
                    bgClass = isDarkMode ? "bg-blue-950/40 border-blue-900 text-blue-200" : "bg-blue-50/90 border-blue-200 text-blue-900";
                    classContentHtml = `<div class="text-[11px] md:text-xs font-bold ${isDarkMode ? 'text-blue-400':'text-blue-700'} leading-tight">${classInfo.text}</div>`;
                } else if (classInfo.type === '화목') {
                    bgClass = isDarkMode ? "bg-purple-950/40 border-purple-900 text-purple-200" : "bg-purple-50/90 border-purple-200 text-purple-900";
                    classContentHtml = `<div class="text-[11px] md:text-xs font-bold ${isDarkMode ? 'text-purple-400':'text-purple-700'} leading-tight">${classInfo.text}</div>`;
                }

                // [1번 기능] 오늘 날짜인 경우 테두리 및 그림자 강력 강조 브레이크 포인트 적용
                if (isToday) {
                    baseClass += " ring-2 ring-red-500 shadow-lg z-10 scale-[1.02] md:scale-105 ";
                    textClass = "text-red-500 font-black";
                }

                dayBox.className = baseClass + bgClass;
                dayBox.innerHTML = `
                    <div class="flex justify-between items-center w-full">
                        <span class="font-bold text-xs ${textClass}">${dayNum}</span>
                        ${isToday ? '<span class="text-[8px] bg-red-500 text-white font-extrabold px-1 rounded-sm tracking-tighter">오늘</span>' : ''}
                    </div>
                    <div class="mt-1 w-full flex-1 flex items-end pb-0.5">
                        ${classContentHtml}
                    </div>
                `;

                calendarDaysContainer.appendChild(dayBox);
            });
        }

        // [4번 기능] 다크모드 토글 스위치 함수
        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('calendarDarkMode', isDarkMode);
            applyTheme();
        }

        function applyTheme() {
            const bodyBg = document.getElementById('body-bg');
            const mainCard = document.getElementById('main-card');
            const footerLegend = document.getElementById('footer-legend');
            const sunIcon = document.getElementById('sun-icon');
            const moonIcon = document.getElementById('moon-icon');

            const txt1 = document.getElementById('legend-text-1');
            const txt2 = document.getElementById('legend-text-2');
            const bBox = document.getElementById('legend-blue');
            const pBox = document.getElementById('legend-purple');

            if (isDarkMode) {
                // 다크 모드 스타일 입히기
                bodyBg.className = "bg-slate-900 min-h-screen p-2 md:p-8 flex flex-col items-center justify-center text-slate-100";
                mainCard.className = "max-w-4xl w-full bg-slate-950 rounded-2xl shadow-2xl overflow-hidden border border-slate-800 transition-colors duration-300";
                footerLegend.className = "bg-slate-900 px-6 py-3 border-t border-slate-800 flex justify-center gap-6 text-xs font-medium transition-colors duration-300";
                
                txt1.className = "text-slate-400"; txt2.className = "text-slate-400";
                bBox.className = "w-3 h-3 bg-blue-950 border border-blue-900 rounded";
                pBox.className = "w-3 h-3 bg-purple-950 border border-purple-900 rounded";

                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                // 라이트 모드 스타일 원복
                bodyBg.className = "bg-slate-50 min-h-screen p-2 md:p-8 flex flex-col items-center justify-center text-slate-800";
                mainCard.className = "max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 transition-colors duration-300";
                footerLegend.className = "bg-slate-50 px-6 py-3 border-t border-slate-100 flex justify-center gap-6 text-xs font-medium transition-colors duration-300";
                
                txt1.className = "text-slate-600"; txt2.className = "text-slate-600";
                bBox.className = "w-3 h-3 bg-blue-50 border border-blue-200 rounded";
                pBox.className = "w-3 h-3 bg-purple-50 border border-purple-200 rounded";

                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
            initCalendar(); // 카드 내부 셀들 다시 그리기
        }

        window.onload = () => {
            applyTheme(); // 초기 실행 시 테마 세팅 및 달력 로드
        };
    </script>
</body>
</html>
